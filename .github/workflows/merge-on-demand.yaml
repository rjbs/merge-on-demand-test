name: Merge on demand

on:
  issue_comment:
    types: [created]

jobs:
  merge-on-demand:
    if: >-
      github.event.issue.pull_request.url != '' &&
      contains(github.event.comment.body, '!!merge-this')
    runs-on: ubuntu-latest

    # Serialize merges repo-wide: two commands racing to push the base
    # branch would leave the loser with a non-fast-forward rejection. The
    # base branch isn't in the issue_comment payload, so we can't key on
    # it; merges are rare and fast, so serializing the whole workflow is
    # cheap. Never cancel an in-flight merge mid-push. -- claude, 2026-05-29
    concurrency:
      group: merge-on-demand-${{ github.repository }}
      cancel-in-progress: false

    permissions:
      contents: write
      pull-requests: write

    steps:
      - name: Check permission and get PR details
        id: info
        uses: actions/github-script@v7
        with:
          script: |
            // The job-level `if` is a cheap substring prefilter. The real
            // command test is here: `!!merge-this` must appear as its own
            // line (after trimming), so inline mentions, negations like
            // "not ready to !!merge-this", and `>`-quoted replies do not
            // trigger a merge. -- claude, 2026-05-29
            const body = context.payload.comment.body || '';
            const isCommand = body
              .split(/\r?\n/)
              .some(line => line.trim() === '!!merge-this');

            if (!isCommand) {
              core.info('no !!merge-this command line found; skipping');
              return;
            }

            const login = context.payload.comment.user.login;

            const { data: collab } = await github.rest.repos.getCollaboratorPermissionLevel({
              owner: context.repo.owner,
              repo: context.repo.repo,
              username: login,
            });

            if (!['admin', 'write'].includes(collab.permission)) {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.issue.number,
                body: `@${login} does not have push access to this repository.`,
              });
              core.setFailed('insufficient permission');
              return;
            }

            const { data: pr } = await github.rest.pulls.get({
              owner: context.repo.owner,
              repo: context.repo.repo,
              pull_number: context.issue.number,
            });

            const baseRepo = `${context.repo.owner}/${context.repo.repo}`;
            const headRepo = pr.head.repo ? pr.head.repo.full_name : null;

            if (headRepo === null) {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.issue.number,
                body: 'Cannot merge: the head repository no longer exists (deleted fork?).',
              });
              core.setFailed('head repo is gone');
              return;
            }

            // "Allow edits from maintainers" only exists on fork PRs; a
            // same-repo PR reports maintainer_can_modify: false even though
            // we can obviously push to it. Require the flag only for forks.
            // -- claude, 2026-05-29
            if (headRepo !== baseRepo && !pr.maintainer_can_modify) {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.issue.number,
                body: 'Cannot merge: contributor has not enabled "Allow edits from maintainers". Please enable it and try again.',
              });
              core.setFailed('maintainer_can_modify is false');
              return;
            }

            // GITHUB_TOKEN is a GitHub App token, which GitHub forbids from
            // pushing changes under .github/workflows/ (the `workflows`
            // permission can't be granted to it). Such a PR would fail at
            // the push with a cryptic error, so refuse it up front with an
            // explanation instead. -- claude, 2026-05-29
            const files = await github.paginate(github.rest.pulls.listFiles, {
              owner: context.repo.owner,
              repo: context.repo.repo,
              pull_number: context.issue.number,
              per_page: 100,
            });

            const touchesWorkflows = files.some(f =>
              f.filename.startsWith('.github/workflows/') ||
              (f.previous_filename || '').startsWith('.github/workflows/')
            );

            if (touchesWorkflows) {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.issue.number,
                body: 'Cannot merge: this PR changes files under `.github/workflows/`, which the merge bot\'s token is not permitted to push. Please merge it by hand.',
              });
              core.setFailed('PR modifies workflow files');
              return;
            }

            core.setOutput('head_ref',  pr.head.ref);
            core.setOutput('head_sha',  pr.head.sha);
            core.setOutput('head_repo', headRepo);
            core.setOutput('base_ref',  pr.base.ref);
            core.setOutput('proceed',   'true');

      - uses: actions/checkout@v6
        if: steps.info.outputs.proceed == 'true'
        with:
          ref: ${{ steps.info.outputs.base_ref }}
          fetch-depth: 0

      - name: Configure git
        if: steps.info.outputs.proceed == 'true'
        run: |
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git config user.name "github-actions[bot]"

      - name: Rebase and merge
        id: merge
        if: steps.info.outputs.proceed == 'true'
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          HEAD_REF:  ${{ steps.info.outputs.head_ref }}
          HEAD_SHA:  ${{ steps.info.outputs.head_sha }}
          HEAD_REPO: ${{ steps.info.outputs.head_repo }}
          BASE_REF:  ${{ steps.info.outputs.base_ref }}
          PR_NUMBER: ${{ github.event.issue.number }}
        run: |
          FORK_URL="https://x-access-token:${GITHUB_TOKEN}@github.com/${HEAD_REPO}.git"

          git fetch origin "${BASE_REF}"
          git fetch "${FORK_URL}" "${HEAD_REF}"

          # Refuse if the branch tip moved between the permission check and
          # now: we merge the commit the maintainer reviewed, not whatever
          # has since been pushed to the fork. -- claude, 2026-05-29
          FETCHED_SHA=$(git rev-parse FETCH_HEAD)
          if [ "${FETCHED_SHA}" != "${HEAD_SHA}" ]; then
            echo "PR head moved from ${HEAD_SHA} to ${FETCHED_SHA} since the command was issued; refusing to merge." >&2
            exit 1
          fi

          git checkout -b pr-branch FETCH_HEAD

          if ! git rebase "origin/${BASE_REF}"; then
            git rebase --abort
            exit 1
          fi

          NEW_SHA=$(git rev-parse HEAD)

          # --no-ff forces a merge commit even though the rebase made
          # pr-branch a fast-forward of base: a semi-linear history of
          # linear PR commits behind one merge commit that introduces no
          # changes of its own. Reset base to the current remote tip first
          # so the merge commit's first parent is up to date and
          # --first-parent history stays clean. -- claude, 2026-05-29
          git checkout -B "${BASE_REF}" "origin/${BASE_REF}"
          git merge --no-ff -m "Merge pull request #${PR_NUMBER}" pr-branch
          MERGE_SHA=$(git rev-parse HEAD)

          # Update the PR head on the fork *before* pushing base. GitHub
          # marks a PR merged when a push to the base branch contains the
          # PR's current head commit; if we push base while the head is
          # still the pre-rebase SHA, that check misses and the PR stays
          # open until some later base push. Moving the head to the rebased
          # commits first means the base push closes it immediately. The
          # cost is that if the base push then fails, the contributor's
          # branch has already been rebased without a merge landing.
          # -- claude, 2026-05-29
          git push --force "${FORK_URL}" "pr-branch:${HEAD_REF}"
          git push origin "${BASE_REF}"

          echo "old_sha=${HEAD_SHA:0:12}"     >> "$GITHUB_OUTPUT"
          echo "new_sha=${NEW_SHA:0:12}"      >> "$GITHUB_OUTPUT"
          echo "merge_sha=${MERGE_SHA:0:12}"  >> "$GITHUB_OUTPUT"

      - name: Comment on success
        if: success() && steps.info.outputs.proceed == 'true'
        uses: actions/github-script@v7
        with:
          script: |
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              body: 'Rebase from ${{ steps.merge.outputs.old_sha }} to ${{ steps.merge.outputs.new_sha }} and merged as ${{ steps.merge.outputs.merge_sha }}.',
            });

      - name: Comment on failure
        if: failure() && steps.info.outcome == 'success'
        uses: actions/github-script@v7
        with:
          script: |
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              body: `Merge failed. See the [action log](${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}) for details.`,
            });
